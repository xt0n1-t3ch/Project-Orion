// =============================================================================
// Project Orion - BLACKWATCH live calibration profile
// =============================================================================
// Profile: Orion_Blackwatch_LiveCalibration
// Purpose: detect and log Reborn/Visuals-style aimbot, silent aim, no-spread,
//          bunnyhop/macro, lag-exploit/fakeping, chems/glow/ESP leakage, and
//          infected spawn-abuse evidence while live false-positive data is built.
//
// Naming convention:
// - Runtime cvars stay lower_snake_case because SourceMod commands are typed live.
// - Section aliases use Orion_PascalCase labels so humans can scan the profile.
//
// Mode policy:
// - shadow  = evidence file only.
// - alert   = evidence file + admin notices; ban-grade actions are logged only.
// - enforce = evidence file + admin notices + real ban action when action=ban.
//
// Current safe live default is alert. Move to enforce only after the current
// Reborn Trainer corpus has zero false positives for the configured thresholds.
// =============================================================================

// -----------------------------------------------------------------------------
// Orion_Core
// -----------------------------------------------------------------------------
// Master plugin switch.
// Default: 1 | Min: 0 | Max: 1 | Recommended: 1
orion_enable "1"

// Runtime mode.
// Default: alert | Values: shadow, alert, enforce | Recommended now: alert
orion_mode "alert"

// Human-readable corpus label written into every structured evidence row.
// Default: live_lagexploit_spawn_validation_20260620_r1 | Values: safe token text
orion_session_label "live_lagexploit_spawn_validation_20260620_r1"

// Evidence verbosity.
// Default: 2 | Min: 0 | Max: 2 | 0=off, 1=high-confidence, 2=suspicious+high
orion_evidence_log_level "2"

// Show admin-facing notices for high-confidence findings.
// Default: 1 | Min: 0 | Max: 1 | Recommended: 1 during calibration
orion_admin_alerts "1"

// -----------------------------------------------------------------------------
// Orion_Aimbot
// -----------------------------------------------------------------------------
// Aim/silent/humanized-aim score needed before Orion records high-confidence aim.
// Default: 75.0 | Min: 0.0 | Max: 100.0 | Recommended: 75.0
orion_aim_score_threshold "75.0"

// Patch impossible client view angles when not in shadow mode.
// Default: 1 | Min: 0 | Max: 1 | Recommended: 1
orion_angle_guard_enable "1"

// -----------------------------------------------------------------------------
// Orion_Movement
// -----------------------------------------------------------------------------
// Bunnyhop, macro, speed, command-clock, fake-lag movement score threshold.
// Default: 75.0 | Min: 0.0 | Max: 100.0 | Recommended: 75.0
orion_movement_score_threshold "75.0"

// Allow Orion to patch unsafe usercmd tick/seed values outside shadow mode.
// Default: 0 for calibration | Min: 0 | Max: 1 | Recommended now: 0
orion_hard_mitigation_enable "0"

// -----------------------------------------------------------------------------
// Orion_LagExploit
// -----------------------------------------------------------------------------
// Client integrity threshold for usercmd reuse/regression, fakeping/backtrack,
// command mutation, and lag-exploit evidence.
// Default: 70.0 | Min: 0.0 | Max: 100.0 | Recommended: 70.0
orion_integrity_score_threshold "70.0"

// Score suspicious command tick drift/backtrack windows.
// Default: 1 | Min: 0 | Max: 1 | Recommended: 1
orion_backtrack_patch_enable "1"

// Base allowed usercmd tick drift before network-aware allowances are applied.
// Default: 2 ticks | Min: 0 | Max: 16 | Recommended: 2
orion_backtrack_tolerance_ticks "2"

// Maximum allowed ping evidence. 0 disables ping-only enforcement evidence.
// Default: 0 | Min: 0 | Max: 1000 | Recommended: 0; do not punish ping alone
orion_max_ping_ms "0"

// Maximum allowed packet-loss evidence. 0 disables loss-only enforcement evidence.
// Default: 0.0 | Min: 0.0 | Max: 100.0 | Recommended: 0.0
orion_max_loss_percent "0.0"

// -----------------------------------------------------------------------------
// Orion_Visibility
// -----------------------------------------------------------------------------
// Suppress ghost/inactive infected transmission to survivors.
// Default: 1 | Min: 0 | Max: 1 | Recommended: 1
orion_visibility_guard_enable "1"

// Log enemy player transmit where PVS says the enemy is hidden.
// Default: 1 | Min: 0 | Max: 1 | Recommended: 1
orion_visibility_pvs_enable "1"

// Hard-block enemy player transmit when Orion PVS proves no visibility.
// Default: 0 | Min: 0 | Max: 1 | Recommended now: 0 until map corpus is proven
orion_visibility_pvs_block_enable "0"

// Seconds to keep transmit allowed after last proven visibility.
// Default: 3.0 | Min: 0.0 | Max: 10.0 | Recommended: 3.0
orion_visibility_pvs_grace_seconds "3.0"

// Minimum enemy distance before PVS block mode may suppress transmit.
// Default: 900.0 units | Min: 0.0 | Max: 5000.0 | Recommended: 900.0
orion_visibility_pvs_min_block_distance "900.0"

// Visibility traces allowed per server tick before failing open.
// Default: 512 | Min: 1 | Max: 4096 | Recommended: 512
orion_visibility_trace_budget_per_tick "512"

// -----------------------------------------------------------------------------
// Orion_SpawnGuard
// -----------------------------------------------------------------------------
// Log human infected materialization near or visible to survivors.
// Default: 1 | Min: 0 | Max: 1 | Recommended: 1
orion_spawn_abuse_guard_enable "1"

// Visible infected-spawn evidence range.
// Default: 650.0 units | Min: 0.0 | Max: 3000.0 | Recommended: 650.0
orion_spawn_abuse_visible_distance "650.0"

// Extreme proximity infected-spawn evidence range even without direct LOS.
// Default: 250.0 units | Min: 0.0 | Max: 1500.0 | Recommended: 250.0
orion_spawn_abuse_near_distance "250.0"

// -----------------------------------------------------------------------------
// Orion_ClientPolicy
// -----------------------------------------------------------------------------
// Interp/lerp envelope for anti-backtrack policy.
// Defaults: lerp=150.0ms, max_ratio=2.0, min_ratio=0.0
// Ranges: lerp 0.0-500.0, ratios 0.0-10.0
orion_max_lerp_ms "150.0"
orion_max_interp_ratio "2.0"
orion_min_interp_ratio "0.0"

// Abuse protections for chat clearing/control chars and unsafe names.
// Default: 1 | Min: 0 | Max: 1 | Recommended: 1
orion_chat_guard_enable "1"
orion_name_guard_enable "1"

// -----------------------------------------------------------------------------
// Orion_VocalizeGuard
// -----------------------------------------------------------------------------
// Detect and punish vocalize spam (radial/voice-command flooding). A player may
// vocalize freely up to the budget; past it without a quiet cooldown each extra
// vocalize is blocked and counted as a spam alert, and the player is kicked once
// the alert count is reached. Type: mitigation + enforcement (kick).
// Default: 1 | Min: 0 | Max: 1 | Recommended: 1
orion_vocalize_guard_enable "1"

// Vocalizes allowed in a burst before spam alerts begin.
// Default: 5 | Min: 1 | Max: 50 | Recommended: 5
orion_vocalize_budget "5"

// Quiet seconds after hitting the budget that forgive the burst; vocalizing
// again before this elapses counts as spam.
// Default: 3.0 | Min: 0.5 | Max: 30.0 | Recommended: 3.0
orion_vocalize_cooldown_seconds "3.0"

// Spam alerts a player accumulates before Orion kicks them.
// Default: 3 | Min: 0 (0 disables the kick) | Max: 20 | Recommended: 3
orion_vocalize_alerts_before_kick "3"

// -----------------------------------------------------------------------------
// Orion_AbilityGuard
// -----------------------------------------------------------------------------
// Detects special-infected ability glitches the Reborn trainer ships: infinite
// spit, double vomit, infinite tank punch, infinite stumble, charger rotation,
// jockey re-entry, and air stuck. Each cheat re-uses an ability faster than its
// real cooldown or forces an impossible state; cooldown/window values are tuned
// against live play. Type: evidence (rolling score, no single-event ban).
// Cooldown/window defaults are conservative and marked CONFIRM ON LIVE.
// Default: 1 | Min: 0 | Max: 1 | Recommended: 1
orion_ability_guard_enable "1"

// Minimum legal seconds between each ability; faster is cooldown abuse.
// Defaults (seconds): spit 14.0, vomit 1.0, tank punch 1.5, stumble 1.0,
// charge 12.0, jockey 5.0, air-stuck report 2.0 | Min: 0.0 | Max: 60.0
orion_ability_guard_spit_cooldown_seconds "14.0"
orion_ability_guard_vomit_cooldown_seconds "1.0"
orion_ability_guard_tank_punch_cooldown_seconds "1.5"
orion_ability_guard_stumble_cooldown_seconds "1.0"
orion_ability_guard_charge_cooldown_seconds "12.0"
orion_ability_guard_jockey_cooldown_seconds "5.0"
orion_ability_guard_air_stuck_cooldown_seconds "2.0"

// State-glitch windows (ticks) and the charger steer cap (degrees).
// Defaults: double-vomit window 10, jockey re-entry window 32,
// charger steer cap 30.0 deg, air-stuck window 33 ticks (~1s).
orion_ability_guard_double_vomit_window_ticks "10"
orion_ability_guard_jockey_state_window_ticks "32"
orion_ability_guard_charger_steer_cap_degrees "30.0"
orion_ability_guard_air_stuck_window_ticks "33"

// -----------------------------------------------------------------------------
// Orion_Alerts (who sees each detection)
// -----------------------------------------------------------------------------
// Alerts are localized to each recipient's game language and colored. Per
// detection type you choose the audience. Values for every cvar below:
//   everyone     = all players see the alert
//   admins       = only admins (override "orion_alert_<type>", else generic flag)
//   flag:<flags> = only players with these SourceMod admin flags (e.g. flag:b)
//   off          = nobody (still logged to orion.log and reviewable via sm_orion_log)
// Per-type overrides also resolve through SourceMod admin_overrides by the name
// orion_alert_<type>, exactly like SMAC/Lilac. Type: presentation/access.
// Default (all): admins | Recommended: admins during calibration
orion_alert_audience_default "admins"
orion_alert_audience_aim "admins"
orion_alert_audience_movement "admins"
orion_alert_audience_usercmd_guard "admins"
orion_alert_audience_lag_exploit "admins"
orion_alert_audience_visibility_guard "admins"
orion_alert_audience_spawn_guard "admins"
orion_alert_audience_abuse_command "admins"
orion_alert_audience_abuse_name "admins"
orion_alert_audience_angle_guard "admins"
orion_alert_audience_integrity "admins"
orion_alert_audience_vocalize_spam "admins"
orion_alert_audience_ability_guard "admins"

// -----------------------------------------------------------------------------
// Orion_AimIntegrity (silent / nospread / norecoil / rapidfire)
// -----------------------------------------------------------------------------
// Multi-signal, hit-correlated aim detections. All thresholds are conservative
// and CONFIRM ON LIVE. Type: evidence (rolling score, never single-event ban).
// Master switch. Default: 1 | Min: 0 | Max: 1
orion_aim_integrity_enable "1"
// Silent aim = a hit while the served crosshair is off the victim.
// silent_mismatch_degrees Default: 35.0 (0-180) | min_hits Default: 3 (1-50)
orion_aim_silent_mismatch_degrees "35.0"
orion_aim_silent_mismatch_min_hits "3"
// Nospread = laser-tight grouping without the laser upgrade bit.
// laser_tight_degrees Default: 1.5 (0-45) | min_hits Default: 4 (1-50)
orion_aim_laser_tight_degrees "1.5"
orion_aim_laser_tight_min_hits "4"
// Norecoil = flat cumulative pitch across a sustained burst.
// flat_pitch_degrees 2.0 (0-45) | min_burst_shots 6 (2-100) | min_hits 3 (1-50)
orion_aim_norecoil_flat_pitch_degrees "2.0"
orion_aim_norecoil_min_burst_shots "6"
orion_aim_norecoil_min_hits "3"
// Rapidfire = shots faster than the legal cycle.
// min_cycle_ticks 3 (1-66) | min_signals 3 (1-50)
orion_aim_rapidfire_min_cycle_ticks "3"
orion_aim_rapidfire_min_signals "3"

// -----------------------------------------------------------------------------
// Orion_MovementExploits (lagexploit / backtrack / speed / teleport / fake-angle)
// -----------------------------------------------------------------------------
// Built on the per-client tickbase baseline. Deviation-based, never absolute.
// All CONFIRM ON LIVE. Type: evidence.
// Backtrack/forwardtrack: tick regression/advance correlated with a hit.
// forwardtrack_tolerance_ticks 11 (0-64) | backtrack_hit_window_ticks 8 (1-64)
orion_forwardtrack_tolerance_ticks "11"
orion_backtrack_hit_window_ticks "8"
// Speedhack: commands-per-window vs tickrate + tickbase vs elapsed.
// command_rate_window_seconds 1.0 (0.25-10) | command_rate_allowance_ticks 8 (0-64)
orion_movement_command_rate_window_seconds "1.0"
orion_movement_command_rate_allowance_ticks "8"
// Lagexploit/fakeping/speed via m_nTickBase.
// tickbase_deviation_tolerance_ticks 12 (0-128) | tickbase_rate_allowance_ticks 8 (0-64)
orion_movement_tickbase_deviation_tolerance_ticks "12"
orion_movement_tickbase_rate_allowance_ticks "8"
// Fake-angle: served move-through-yaw vs actual velocity direction (ground only).
// tolerance_degrees 45.0 (0-180) | streak_ticks 16 (1-200) | min_speed_ups 120.0
orion_movement_fake_angle_tolerance_degrees "45.0"
orion_movement_fake_angle_streak_ticks "16"
orion_movement_fake_angle_min_speed_ups "120.0"
// Teleport: per-tick horizontal jump beyond max-speed*tickinterval*multiplier.
// min_horizontal_units 250.0 | allowance_multiplier 1.5 (1-10) | max_speed_ups 400.0
orion_movement_teleport_min_horizontal_units "250.0"
orion_movement_teleport_allowance_multiplier "1.5"
orion_movement_teleport_max_speed_ups "400.0"

// -----------------------------------------------------------------------------
// Orion_VisibilityPrefire (behavioral wall-awareness)
// -----------------------------------------------------------------------------
// Visual cheats (chams/ESP/wallhack/radar) cannot be detected server-side; this
// is the only behavioral signal: precise aim/fire at a PVS-hidden, not-recently-
// visible enemy. CONFIRM ON LIVE. Type: evidence.
// enable 1 | aim_dot_min 0.985 (0-1) | window_seconds 3.0 | min_events 3 | cooldown 5.0
orion_visibility_prefire_enable "1"
orion_visibility_prefire_aim_dot_min "0.985"
orion_visibility_prefire_window_seconds "3.0"
orion_visibility_prefire_min_events "3"
orion_visibility_prefire_evidence_cooldown_seconds "5.0"

// -----------------------------------------------------------------------------
// Orion_Enforcement
// -----------------------------------------------------------------------------
// Ban length when mode=enforce and evidence action=ban.
// Default: 0 permanent | Min: 0 | Max: unbounded
orion_ban_minutes "0"

// Ban integration provider label.
// Default: basebans | Values: none, basebans, sourcebans
orion_ban_provider "basebans"
